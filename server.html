<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prasadam Server</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .fullscreen-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:#fff; z-index:9999; display:none;
      cursor:pointer; touch-action:manipulation;
    }
    .fullscreen-overlay::after {
      content:"TAP"; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:48px; font-weight:700; color:#052f5f;
    }
    .fullscreen-hide { display:none!important; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="title" id="serverNameDisplay">Server</div>
      <div id="authArea"></div>
    </div>

    <!-- Counts -->
    <div class="card">
      <div class="row">
        <div>
          <div class="small muted">Your Count</div>
          <div id="myCount" class="count-big">0</div>
        </div>
        <div>
          <div class="small muted">Leader Total</div>
          <div id="totalCount" class="count-big">0</div>
        </div>
      </div>
      <div id="connectedInfo" style="margin-top:10px;display:none">
        <div class="small muted">Connected to</div>
        <div id="connectedLeaderName" style="font-weight:700;margin-top:6px">—</div>
      </div>
    </div>

    <!-- Disk -->
    <div class="disk-wrap">
      <div id="disk" class="disk">TAP</div>
    </div>

    <!-- Feed -->
    <div class="card">
      <div class="small muted">Recent Serves</div>
      <div id="feed" class="feed"></div>
    </div>

    <!-- Connect to Leader -->
    <div class="card" id="connectCard">
      <div class="small muted">Connect to Leader</div>
      <input id="leaderIdInput" class="input" placeholder="Leader ID" style="margin-top:6px">
      <input id="leaderPwInput" class="input" type="password" placeholder="Password" style="margin-top:6px">
      <button id="connectBtn" class="btn" style="margin-top:8px">Connect</button>
      <div id="connectStatus" class="small muted" style="margin-top:6px"></div>
    </div>


    <!-- Settings -->
    <div class="card">
      <div class="small muted">Settings</div>
      <input id="nameInput" class="input" placeholder="Your display name">
      <button id="saveNameBtn" class="btn" style="margin-top:8px">Save Name</button>
      <button id="disconnectBtn" class="btn-ghost" style="margin-top:8px">Disconnect</button>
      <button id="fullscreenBtn" class="btn-ghost" style="margin-top:8px">Fullscreen</button>
    </div>

    <div class="footer">Tap the big circle to count.</div>
  </div>

  <!-- Fullscreen overlay -->
  <div id="fsOverlay" class="fullscreen-overlay"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="server.js"></script>
</body>
</html>
